name: CI/CD Pipeline

on:
  push:
    branches: [ test/automacao ]
  pull_request:
    branches: [ test/automacao ]
  schedule:
    - cron: '0 0 * * *'  # Executa diariamente à meia-noite

jobs:
  playwright-tests:
    name: Playwright Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests in parallel
        run: npx playwright test --reporter=html

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/

      - name: Deploy Playwright Report to GitHub Pages
        if: github.ref == 'refs/heads/test/automacao' && github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: playwright-report
          force_orphan: true
          enable_jekyll: false

  k6-load-tests:
    name: k6 Load Tests
    runs-on: ubuntu-latest
    needs: playwright-tests

    steps:
      - uses: actions/checkout@v4

      - name: Run k6 Load Test
        uses: grafana/k6-action@v0.3.0
        with:
          filename: k6/load-test.js
          flags: --out json=results.json

      - name: Run k6 API Test
        uses: grafana/k6-action@v0.3.0
        with:
          filename: k6/api-specific-tests.js

      - name: Upload k6 results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-results
          path: results.json

  docker-build:
    name: Docker Build and Test
    runs-on: ubuntu-latest
    needs: k6-load-tests
    if: github.ref == 'refs/heads/test/automacao' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build and run Docker Compose
        run: |
          docker-compose build
          docker-compose up -d

      - name: Run tests inside Docker container
        run: docker-compose exec -T playwright npx playwright test

      - name: Tear down Docker Compose
        run: docker-compose down
